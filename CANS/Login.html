<!DOCTYPE html>
<html>
<head>
  <title>Construction Alert Notification System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      text-align: center;
      padding-top: 30px;
    }
    .icon{
      position: absolute;
      top: 5px;
      left: 100px;
      width: 150px;
      height: 150px;
    }
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 200px;
      padding: 20px;

    }
    .nav-bar a {
      text-decoration: none;
      color:#333;
      font-weight: bold;
    }
    .nav-bar a:hover{
      color: blue;
      cursor:pointer;
    }
    h1 {
      color: #333;
    }
  </style>
</head>
<body>
  <!-- Icon -->
  <a href="Home.html"><img src = "icon.jpg" class="icon" alt="Site Icon"></a>
  <!-- Header -->
  <h1>Construction Alert Notification System</h1>
  <div style="font-weight: bold;"><p>Road Construction Information For Greater Victoria Region</p></div>
  <!-- Border Box -->
  <div style="width: 45vmin; aspect-ratio: 1 / 1.5; border: #333 2px solid; box-sizing:border-box; margin: 40px auto;">
  <!-- Sign in label -->
  <div style="display: flex; justify-content: flex-start; margin-top: 10px; margin-left: 10px; font-weight: bold; font-size: x-large;">
    <a>Sign in</a>
  </div>
  <!-- Login inputs -->
  <div style="margin-top: 20px; margin-left: 10px;">
  <form action="Homepage_Login.html" method="get" style="max-width:320px;">
  <label for="username" style="display:flex; margin:8px 0 4px;">Username:</label>
  <input id="username" name="username" type="text" autocomplete="username" required
         style="display:flex; padding: 5px 0; border:0; border-bottom:1px solid #ccc; background:transparent; outline:none;">

  <label for="password" style="display:flex; margin:12px 0 4px;">Password:</label>
  <div style="display:flex; gap:12px; flex:1;">
  <input id="password" name="password" type="password" autocomplete="current-password" required
         style="display:flex; padding: 5px 0; border:0; border-bottom:1px solid #ccc; background:transparent; outline:none;">
  <!-- Show/Hide Password -->
  <button type="button" id="togglePw"
            aria-label="Show password" aria-pressed="false"
            style="display: inline-flex; align-items: center; 
                  background:none; border:0; cursor:pointer; padding:4px; line-height:0;">
  <!-- Open eye icon by default-->
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"
            stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
  </svg>
  </button>
  </div>
  <!-- Show password script -->
  <script>
  const input = document.getElementById('password');
  const btn   = document.getElementById('togglePw');

  const eyeOpen = `
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"
            stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
    </svg>`;

  const eyeOff = `
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"
            stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2"/>
    </svg>`;

  btn.addEventListener('click', () => {
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.setAttribute('aria-pressed', show ? 'true' : 'false');
    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    btn.innerHTML = show ? eyeOff : eyeOpen;
  });
</script>
  <!-- Remember username on next load -->
  <div style="display:flex; margin-top: 6px;">
  <label for="remember" style="display:flex; gap:6px; user-select:none;">
    <input type="checkbox" id="remember" name="remember" value="1"> Remember me
  </label>
  </div>
  <!-- Remember username script -->
  <script>
  // Prefill on load
  const saved = localStorage.getItem('remember') === '1';
  if (saved) {
    document.getElementById('remember').checked = true;
    const u = localStorage.getItem('username');
    if (u) document.getElementById('username').value = u;
  }

  // On submit: save or clear username
  document.getElementById('loginForm').addEventListener('submit', e => {
    const remember = document.getElementById('remember').checked;
    const username = document.getElementById('username').value;
    if (remember) {
      localStorage.setItem('remember', '1');
      localStorage.setItem('username', username);
    } else {
      localStorage.removeItem('remember');
      localStorage.removeItem('username');
    }
  });
  </script>
   <!-- Sign in Button -->
  <button type="submit"
          style="margin-right:10px; margin-top:20px; padding:15px 35px; border:0; border-radius:6px; cursor:pointer; font-weight: bold;">
    Sign in
  </button>
  <div style="margin-right: 10px;margin-top: 10px; font-size: smaller;">
    <a>Or sign in using:</a>
  </div>
  <!-- Sign in Alternatives -->
  <div style="margin-right: 10px; margin-top: 10px; gap: 30px;">
  <!-- Option 1 -->
    <a href="#" aria-label="Option 1"
     style="display:inline-flex; width:36px; height:36px; align-items:center; justify-content:center;
            border:1px solid #ddd; border-radius:50%; text-decoration:none;">
    <img src = "GoogleIcon.png" alt="Option 1"
         style="width:22px; height:22px; object-fit:contain; display:block;">
     </a>
  <!-- Option 2 -->
    <a href="#" aria-label="Option 2"
     style="display:inline-flex; width:36px; height:36px; align-items:center; justify-content:center;
            border:1px solid #ddd; border-radius:50%; text-decoration:none;">
    <img src = "MicrosoftIcon.png" alt="Option 2"
         style="width:22px; height:22px; object-fit:contain; display:block;">
     </a>
  <!-- Option 3 -->
    <a href="#" aria-label="Option 3"
     style="display:inline-flex; width:36px; height:36px; align-items:center; justify-content:center;
            border:1px solid #ddd; border-radius:50%; text-decoration:none;">
    <img src = "AppleIcon.png" alt="Option 3"
         style="width:22px; height:22px; object-fit:contain; display:block;">
     </a>
  </div>
  <div style="margin-right: 10px; margin-top: 20px; font-size: smaller;">
    <a>New to our website? Sign up </a><a href="Signup.html">here!</a>
  </div>
  </form>
  </div>
  </div>
</body>
</html>
